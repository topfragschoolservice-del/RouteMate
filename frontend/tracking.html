<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMate - Live Bus Tracking</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin: 0;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select, button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: all 0.3s;
        }

        select {
            min-width: 200px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .tracking-grid {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .map-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .info-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            color: #667eea;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 18px;
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-moving {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-stopped {
            background: #fef3c7;
            color: #78350f;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .eta-section {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .eta-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .eta-time {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .eta-arrival {
            font-size: 13px;
            opacity: 0.85;
        }

        .legend {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .legend-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .legend-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .bus-icon {
            background: #667eea;
        }

        .waypoint-icon {
            background: #48bb78;
        }

        .school-icon {
            background: #f56565;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        @media (max-width: 1024px) {
            .tracking-grid {
                grid-template-columns: 1fr;
            }

            #map {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div>
                <h1>🗺️ Live Bus Tracking</h1>
                <div style="color: #666; font-size: 14px; margin-top: 5px;">
                    Real-time GPS location monitoring
                </div>
            </div>
            <div class="header-controls">
                <select id="busSelect" onchange="selectBus()">
                    <option value="">-- Select Bus --</option>
                    <option value="B001">🚌 Bus B001 (Fort - Royal College)</option>
                    <option value="B002">🚌 Bus B002 (Central - Nawala)</option>
                </select>
                <div class="auto-refresh-toggle">
                    <label style="color: white; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()">
                            <span class="toggle-slider"></span>
                        </label>
                        Auto-refresh
                    </label>
                </div>
                <button onclick="manualRefresh()">🔄 Refresh</button>
            </div>
        </header>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-title">Map Legend</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-icon bus-icon">🚌</div>
                    <span>Bus Location (Real-time)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-icon waypoint-icon">📍</div>
                    <span>Route Waypoints</span>
                </div>
                <div class="legend-item">
                    <div class="legend-icon school-icon">🏫</div>
                    <span>School Location</span>
                </div>
            </div>
        </div>

        <!-- Main Tracking Grid -->
        <div class="tracking-grid">
            <!-- Map Section -->
            <div class="map-section">
                <div id="map"></div>
            </div>

            <!-- Info Section -->
            <div class="info-section">
                <!-- Bus Status -->
                <div class="info-card">
                    <div class="info-label">Status</div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span id="busStatus" class="status-badge status-stopped">Stopped</span>
                        <span id="busSpeed" style="color: #667eea; font-weight: 600;">0 km/h</span>
                    </div>
                </div>

                <!-- Route Progress -->
                <div class="info-card">
                    <div class="info-label">Route Progress</div>
                    <div id="progressPercent" style="font-size: 24px; font-weight: 700; color: #667eea;">0%</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Distance Traveled -->
                <div class="info-card">
                    <div class="info-label">Distance Traveled</div>
                    <div id="distanceTraveled" class="info-value">0.0 km</div>
                </div>

                <!-- Current Location -->
                <div class="info-card">
                    <div class="info-label">Current Location</div>
                    <div id="locationName" class="info-value" style="font-size: 14px; margin-bottom: 8px;">-</div>
                    <div id="coordinates" style="color: #999; font-size: 12px;">
                        Lat: <span id="latitude">-</span><br>
                        Lon: <span id="longitude">-</span>
                    </div>
                </div>

                <!-- ETA -->
                <div class="eta-section">
                    <div class="eta-label">Estimated Arrival</div>
                    <div class="eta-time" id="etaMinutes">--</div>
                    <div class="eta-arrival">minutes from now</div>
                </div>

                <!-- Last Updated -->
                <div class="info-card">
                    <div class="info-label">Last Updated</div>
                    <div id="lastUpdated" style="color: #999; font-size: 13px;">--:-- --</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <script>
        const API_URL = 'http://localhost:3000';
        let map;
        let busMarker;
        let waypointMarkers = [];
        let routePolyline;
        let selectedBus = null;
        let autoRefreshInterval;
        let isAutoRefresh = true;

        // Initialize map on page load
        window.addEventListener('load', initMap);

        function initMap() {
            // Create map centered on Colombo, Sri Lanka
            map = L.map('map').setView([6.9271, 80.7789], 12);

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19,
                minZoom: 3
            }).addTo(map);

            console.log('Map initialized');
        }

        function selectBus() {
            selectedBus = document.getElementById('busSelect').value;
            if (selectedBus) {
                loadBusTracking();
            }
        }

        function loadBusTracking() {
            if (!selectedBus) {
                alert('Please select a bus');
                return;
            }

            fetch(`${API_URL}/tracking/parent/${selectedBus}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        updateMap(data);
                        updateInfo(data);
                    } else {
                        alert('Bus not found: ' + data.message);
                    }
                })
                .catch(err => {
                    alert('Error loading tracking data: ' + err.message);
                    console.error(err);
                });
        }

        function updateMap(data) {
            const lat = data.location.latitude;
            const lon = data.location.longitude;

            // Update bus marker
            if (busMarker) {
                map.removeLayer(busMarker);
            }

            busMarker = L.marker([lat, lon], {
                icon: L.divIcon({
                    html: `
                        <div style="
                            background: #667eea;
                            color: white;
                            border-radius: 50%;
                            width: 40px;
                            height: 40px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 20px;
                            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                            border: 3px solid white;
                        ">🚌</div>
                    `,
                    className: 'bus-marker',
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                })
            }).addTo(map);

            // Add popup with bus info
            busMarker.bindPopup(`
                <div style="text-align: center;">
                    <strong>Bus ${selectedBus}</strong><br>
                    Location: ${data.location.name}<br>
                    Speed: ${data.speed} km/h<br>
                    Status: ${data.isMoving ? 'Moving' : 'Stopped'}
                </div>
            `);

            // Center map on bus
            map.setView([lat, lon], 14);

            // Load route waypoints
            loadRouteWaypoints();
        }

        function loadRouteWaypoints() {
            // Fetch route data and show waypoints
            fetch(`${API_URL}/bus/${selectedBus}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        // For now, show predefined waypoints
                        const routes = {
                            'B001': [
                                { lat: 6.9271, lon: 80.6470, name: 'Colombo Fort Station' },
                                { lat: 6.9280, lon: 80.6500, name: 'Old Parliament Road' },
                                { lat: 6.9300, lon: 80.6600, name: 'Galle Face Green' },
                                { lat: 6.9350, lon: 80.6750, name: 'Colombo City Center' },
                                { lat: 6.9400, lon: 80.7000, name: 'Royal College Colombo' }
                            ],
                            'B002': [
                                { lat: 6.9497, lon: 80.7891, name: 'Colombo Central Bus Station' },
                                { lat: 6.9450, lon: 80.7950, name: 'Rajagiriya Junction' },
                                { lat: 6.9380, lon: 80.8100, name: 'Nawala Town' },
                                { lat: 6.9300, lon: 80.8250, name: 'Sri Jayawardanapura School' }
                            ]
                        };

                        const route = routes[selectedBus] || [];

                        // Clear old waypoints
                        waypointMarkers.forEach(m => map.removeLayer(m));
                        waypointMarkers = [];

                        if (routePolyline) {
                            map.removeLayer(routePolyline);
                        }

                        // Add waypoint markers
                        const latlngs = [];
                        route.forEach((wp, index) => {
                            latlngs.push([wp.lat, wp.lon]);

                            const marker = L.marker([wp.lat, wp.lon], {
                                icon: L.divIcon({
                                    html: `
                                        <div style="
                                            background: ${index === route.length - 1 ? '#f56565' : '#48bb78'};
                                            color: white;
                                            border-radius: 50%;
                                            width: 35px;
                                            height: 35px;
                                            display: flex;
                                            align-items: center;
                                            justify-content: center;
                                            font-size: 16px;
                                            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
                                            border: 2px solid white;
                                        ">${index === route.length - 1 ? '🏫' : '📍'}</div>
                                    `,
                                    className: 'waypoint-marker',
                                    iconSize: [35, 35],
                                    iconAnchor: [17, 17]
                                })
                            }).addTo(map);

                            marker.bindPopup(`<strong>${wp.name}</strong>`);
                            waypointMarkers.push(marker);
                        });

                        // Draw route line
                        routePolyline = L.polyline(latlngs, {
                            color: '#667eea',
                            weight: 3,
                            opacity: 0.7,
                            dashArray: '5, 5'
                        }).addTo(map);
                    }
                })
                .catch(err => console.error('Error loading route:', err));
        }

        function updateInfo(data) {
            // Update status
            const statusEl = document.getElementById('busStatus');
            if (data.isMoving) {
                statusEl.textContent = 'Moving';
                statusEl.className = 'status-badge status-moving';
            } else {
                statusEl.textContent = 'Stopped';
                statusEl.className = 'status-badge status-stopped';
            }

            // Update speed
            document.getElementById('busSpeed').textContent = data.speed + ' km/h';

            // Update progress
            document.getElementById('progressPercent').textContent = data.routeProgress + '%';
            document.getElementById('progressFill').style.width = data.routeProgress + '%';

            // Update distance
            document.getElementById('distanceTraveled').textContent = data.totalDistance.toFixed(2) + ' km';

            // Update location
            document.getElementById('locationName').textContent = data.location.name;
            document.getElementById('latitude').textContent = data.location.latitude.toFixed(6);
            document.getElementById('longitude').textContent = data.location.longitude.toFixed(6);

            // Update ETA
            if (data.eta && data.eta.minutes > 0) {
                document.getElementById('etaMinutes').textContent = data.eta.minutes;
            } else {
                document.getElementById('etaMinutes').textContent = '∞';
            }

            // Update timestamp
            const time = new Date(data.lastUpdated).toLocaleTimeString();
            document.getElementById('lastUpdated').textContent = time;
        }

        function manualRefresh() {
            if (selectedBus) {
                loadBusTracking();
            }
        }

        function toggleAutoRefresh() {
            isAutoRefresh = document.getElementById('autoRefresh').checked;

            if (isAutoRefresh) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            autoRefreshInterval = setInterval(() => {
                if (selectedBus) {
                    loadBusTracking();
                }
            }, 2000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        }
    </script>
</body>
</html>
